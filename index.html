<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grassland Dust Animation</title>
    <style>
        /* --- CSS: レイアウト設定 --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* 背景画像を絶対パスで指定 */
            background-image: url('https://r.jina.ai/i/de2164e2621448b495204439f0412803');
            background-size: cover;
            background-position: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            /* 砂煙がマウス操作の邪魔にならないように設定 */
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <canvas id="dustCanvas"></canvas>
    </div>

<script>
/**
 * --- JS: 砂煙（パーティクル）のアニメーション制御 ---
 */
const canvas = document.getElementById('dustCanvas');
const ctx = canvas.getContext('2d');

let particles = [];
const particleCount = 150; // 砂煙の密度

// 画面のリサイズに対応
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class DustParticle {
    constructor() {
        this.init();
    }

    init() {
        // 出現位置: 画面下部（草むらのあたり）から発生
        this.x = Math.random() * canvas.width;
        this.y = canvas.height * (0.5 + Math.random() * 0.5);
        
        // 粒子のサイズ（ぼかしを強くするため大きめに）
        this.size = Math.random() * 50 + 20;
        
        // 移動速度: 右上に風が吹いているイメージ
        this.vx = Math.random() * 2 + 0.5;
        this.vy = -(Math.random() * 1.5 + 0.2);
        
        // 透明度と寿命
        this.alpha = 0;
        this.maxAlpha = Math.random() * 0.2 + 0.05;
        this.life = 0;
        this.maxLife = Math.random() * 400 + 200;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life++;

        // フェードイン・アウトの計算
        if (this.life < 100) {
            this.alpha = (this.life / 100) * this.maxAlpha;
        } else if (this.life > this.maxLife - 100) {
            this.alpha = ((this.maxLife - this.life) / 100) * this.maxAlpha;
        }

        // 画面外に出るか寿命が来たらリセット
        if (this.life >= this.maxLife || this.x > canvas.width || this.y < 0) {
            this.init();
        }
    }

    draw() {
        ctx.beginPath();
        // グラデーションで柔らかい煙の質感を出す
        const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
        // 砂の色（ベージュ系）
        grd.addColorStop(0, `rgba(210, 180, 140, ${this.alpha})`);
        grd.addColorStop(1, 'rgba(210, 180, 140, 0)');
        
        ctx.fillStyle = grd;
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

// 初期化
function createParticles() {
    for (let i = 0; i < particleCount; i++) {
        particles.push(new DustParticle());
    }
}

// ループ処理
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    particles.forEach(p => {
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

createParticles();
animate();
</script>
</body>
</html>
