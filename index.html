<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>草原の岩山と舞う砂煙</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden; /* 画面外の煙を隠す */
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0; /* 読み込み前の背景色 */
        }

        /* 画像を表示するコンテナ */
        .scenery-container {
            position: relative;
            width: 800px; /* 画像の幅に合わせて調整 */
            height: 450px; /* 画像の高さに合わせて調整 */
            background-image: url('image_1.png'); /* 指定された画像へのパス */
            background-size: cover;
            background-position: center;
            border: 2px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* 砂煙アニメーション全体のエリア */
        .dust-field {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none; /* 下の要素の操作を妨げない */
        }

        /* 砂煙の個々のパーティクル（粒） */
        .dust {
            position: absolute;
            background-color: rgba(210, 180, 140, 0.5); /* 砂の色、透明度 */
            border-radius: 50%; /* 丸い形 */
            opacity: 0;
            animation: moveDust linear infinite; /* アニメーション適用 */
        }

        /* 砂煙の動きを定義 */
        @keyframes moveDust {
            0% {
                transform: translate(0, 0); /* 開始位置 */
                opacity: 0;
            }
            10% {
                opacity: 0.5; /* 徐々に表示 */
            }
            100% {
                /* 終了位置: 風に流されるように移動 */
                transform: translate(calc(200px + random(50)px), calc(-150px - random(50)px));
                opacity: 0; /* 最後に消える */
            }
        }

        /* 様々な大きさ、位置、タイミングの砂煙を作成 */
        /* CSSだけでランダム性を出すため、手動で複数の設定を用意 */
        .dust-1 { width: 15px; height: 15px; left: 10%; bottom: 10%; animation-delay: 0s; animation-duration: 4s; }
        .dust-2 { width: 10px; height: 10px; left: 15%; bottom: 12%; animation-delay: 0.5s; animation-duration: 3.5s; }
        .dust-3 { width: 20px; height: 20px; left: 20%; bottom: 10%; animation-delay: 1s; animation-duration: 4.5s; }
        .dust-4 { width: 8px; height: 8px; left: 25%; bottom: 14%; animation-delay: 1.5s; animation-duration: 3s; }
        .dust-5 { width: 18px; height: 18px; left: 30%; bottom: 10%; animation-delay: 2s; animation-duration: 4.2s; }
        .dust-6 { width: 12px; height: 12px; left: 35%; bottom: 11%; animation-delay: 2.5s; animation-duration: 3.8s; }
        .dust-7 { width: 16px; height: 16px; left: 12%; bottom: 8%; animation-delay: 3s; animation-duration: 4s; }
        /* 必要に応じてさらに追加可能 */
    </style>
</head>
<body>

    <div class="scenery-container">
        <div class="dust-field">
            <div class="dust dust-1"></div>
            <div class="dust dust-2"></div>
            <div class="dust dust-3"></div>
            <div class="dust dust-4"></div>
            <div class="dust dust-5"></div>
            <div class="dust dust-6"></div>
            <div class="dust dust-7"></div>
        </div>
    </div>

</body>
</html>
