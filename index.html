<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Background Dust Animation</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            /* 背景を真っ黒に固定 */
            background-color: #000; 
        }
        .wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* 画像を削除し、背景色を黒に徹底 */
            background: #000;
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            pointer-events: none; 
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <canvas id="dustCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('dustCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class DustCloud {
    constructor() {
        this.init();
    }

    init() {
        // 発生源を画面下部に
        this.x = Math.random() * canvas.width;
        this.y = canvas.height * 0.9;
        
        // サイズを大幅に大きく（ポンポン感を出す）
        this.size = Math.random() * 80 + 100;
        
        // 吹き出す速度
        this.vx = (Math.random() - 0.5) * 3;
        this.vy = -(Math.random() * 4 + 2);
        
        this.alpha = 0;
        this.maxAlpha = Math.random() * 0.5 + 0.2; // 黒背景なので少し明るめに
        this.life = 0;
        this.maxLife = Math.random() * 120 + 80;
        this.expand = Math.random() * 2 + 1; // どんどん広がる
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.size += this.expand;
        this.vy += 0.03; // わずかな減速
        this.life++;

        // フェードイン・アウト
        if (this.life < 20) {
            this.alpha = (this.life / 20) * this.maxAlpha;
        } else {
            this.alpha = Math.max(0, this.maxAlpha * (1 - this.life / this.maxLife));
        }

        if (this.life >= this.maxLife) {
            this.init();
        }
    }

    draw() {
        if (this.alpha <= 0) return;
        ctx.beginPath();
        const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
        
        // 黒背景に映える砂の色
        grd.addColorStop(0, `rgba(220, 200, 170, ${this.alpha})`);
        grd.addColorStop(0.4, `rgba(200, 180, 150, ${this.alpha * 0.6})`);
        grd.addColorStop(1, 'rgba(0, 0, 0, 0)');
        
        ctx.fillStyle = grd;
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

const clouds = [];
const cloudCount = 45; // 密度を少しアップ

for (let i = 0; i < cloudCount; i++) {
    setTimeout(() => {
        clouds.push(new DustCloud());
    }, i * 150); // 150msおきにポン、ポンと発生
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 煙が重なった時に明るくなる設定（より立体感が出ます）
    ctx.globalCompositeOperation = 'screen'; 
    
    clouds.forEach(c => {
        c.update();
        c.draw();
    });
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
